model:
  base_model: "gpt2"
  max_length: 128

lora:
  r: 8
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules: ["c_attn"]
  bias: "none"

training:
  output_dir: "./outputs"
  num_train_epochs: 3
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  learning_rate: 2.0e-4
  warmup_steps: 100
  logging_steps: 50
  save_steps: 200
  eval_steps: 200
  weight_decay: 0.01
  fp16: true
  gradient_accumulation_steps: 1
  seed: 42

data:
  label_map:
    0: "negative"
    1: "positive"
    2: "neutral"

inference:
  max_new_tokens: 10
  temperature: 0.1
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.3
  num_return_sequences: 1
